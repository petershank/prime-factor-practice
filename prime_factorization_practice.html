<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Factorization Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .number-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 72px;
            font-weight: bold;
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .answer-display {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f8f9fa;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #333;
            margin-bottom: 15px;
        }

        .calculator-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .num-btn {
            padding: 20px;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .num-btn:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        .num-btn:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .num-btn.operator {
            background: #e8eaf6;
            color: #667eea;
        }

        .num-btn.operator:active {
            background: #d1d5f0;
        }

        .num-btn.clear {
            background: #ffebee;
            color: #c62828;
        }

        .num-btn.clear:active {
            background: #ffcdd2;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: block;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="number-display" id="numberDisplay">---</div>

        <div class="input-section">
            <div class="answer-display" id="answerDisplay">Ready</div>
            
            <div class="calculator-pad">
                <button class="num-btn" data-value="7">7</button>
                <button class="num-btn" data-value="8">8</button>
                <button class="num-btn" data-value="9">9</button>
                
                <button class="num-btn" data-value="4">4</button>
                <button class="num-btn" data-value="5">5</button>
                <button class="num-btn" data-value="6">6</button>
                
                <button class="num-btn" data-value="1">1</button>
                <button class="num-btn" data-value="2">2</button>
                <button class="num-btn" data-value="3">3</button>
                
                <button class="num-btn operator" data-value="×">×</button>
                <button class="num-btn" data-value="0">0</button>
                <button class="num-btn clear" data-value="clear">⌫</button>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="checkBtn">Check</button>
            <button class="btn-secondary" id="newNumberBtn">New</button>
        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        let currentNumber = 0;
        let correctCount = 0;
        let totalCount = 0;
        let currentAnswer = '';

        // Generate a random 3-digit number
        function generateNumber() {
            return Math.floor(Math.random() * 900) + 100; // 100 to 999
        }

        // Calculate prime factorization
        function primeFactorization(n) {
            const factors = [];
            let num = n;

            // Check for 2s
            while (num % 2 === 0) {
                factors.push(2);
                num = num / 2;
            }

            // Check for odd factors from 3 onwards
            for (let i = 3; i <= Math.sqrt(num); i += 2) {
                while (num % i === 0) {
                    factors.push(i);
                    num = num / i;
                }
            }

            // If num is still greater than 1, it's a prime factor
            if (num > 1) {
                factors.push(num);
            }

            return factors;
        }

        // Parse user input
        function parseAnswer(input) {
            // Split by × and filter empty strings
            const factors = input.split('×').filter(s => s.length > 0);
            return factors.map(f => parseInt(f)).filter(n => !isNaN(n)).sort((a, b) => a - b);
        }

        // Compare two arrays
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        // Update answer display
        function updateAnswerDisplay() {
            const display = document.getElementById('answerDisplay');
            display.textContent = currentAnswer || 'Ready';
        }

        // Handle number/operator button clicks
        function handleButtonClick(value) {
            if (value === 'clear') {
                if (currentAnswer.length > 0) {
                    // Remove last character
                    currentAnswer = currentAnswer.slice(0, -1);
                }
            } else if (value === '×') {
                // Only add × if there's already a number and it doesn't end with ×
                if (currentAnswer.length > 0 && !currentAnswer.endsWith('×')) {
                    currentAnswer += '×';
                }
            } else {
                // Add digit
                currentAnswer += value;
            }
            updateAnswerDisplay();
        }

        // Display new number
        function displayNewNumber() {
            currentNumber = generateNumber();
            document.getElementById('numberDisplay').textContent = currentNumber;
            currentAnswer = '';
            updateAnswerDisplay();
            document.getElementById('feedback').style.display = 'none';
        }

        // Check answer
        function checkAnswer() {
            if (!currentAnswer.trim()) {
                alert('Please enter an answer first!');
                return;
            }

            const userFactors = parseAnswer(currentAnswer);
            const correctFactors = primeFactorization(currentNumber);
            const feedback = document.getElementById('feedback');

            totalCount++;

            if (arraysEqual(userFactors, correctFactors)) {
                correctCount++;
                feedback.className = 'feedback correct';
                feedback.innerHTML = `✓ Correct! ${currentNumber} = ${correctFactors.join(' × ')}`;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `✗ Incorrect. The correct answer is: ${currentNumber} = ${correctFactors.join(' × ')}`;
            }
        }

        // Event listeners for calculator buttons
        document.querySelectorAll('.num-btn').forEach(button => {
            button.addEventListener('click', () => {
                handleButtonClick(button.dataset.value);
            });
        });

        // Event listeners for action buttons
        document.getElementById('checkBtn').addEventListener('click', checkAnswer);
        document.getElementById('newNumberBtn').addEventListener('click', displayNewNumber);

        // Keyboard event listener for desktop users
        document.addEventListener('keydown', (e) => {
            // Numbers 0-9
            if (e.key >= '0' && e.key <= '9') {
                handleButtonClick(e.key);
                e.preventDefault();
            }
            // × operator (x, *, or actual × character)
            else if (e.key === 'x' || e.key === 'X' || e.key === '*' || e.key === '×') {
                handleButtonClick('×');
                e.preventDefault();
            }
            // Backspace or Delete
            else if (e.key === 'Backspace' || e.key === 'Delete') {
                handleButtonClick('clear');
                e.preventDefault();
            }
            // Enter to check answer
            else if (e.key === 'Enter') {
                checkAnswer();
                e.preventDefault();
            }
            // 'n' for new number
            else if (e.key === 'n' || e.key === 'N') {
                displayNewNumber();
                e.preventDefault();
            }
        });

        // Initialize with first number
        displayNewNumber();
    </script>
</body>
</html>
